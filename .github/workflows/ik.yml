name: Test Platform Messaging

on:
  workflow_dispatch:  # Allows manual triggering

jobs:
  test-platform-messages:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install dependencies
        run: sudo apt-get install -y jq  # Ensures jq is available

      - name: Send Discord Notification with Buttons
        env:
            DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_ALPHA }}
        run: |
          MESSAGE_JSON=$(jq -n \
            --arg content "🚀 **New Build Available!** Click a button below to download:" \
            --argjson components '[{
              "type": 1,
              "components": [
                {"type": 2, "label": "Android (arm64)", "style": 5, "url": "https://example.com/android-arm64-v1.0.0.apk"},
                {"type": 2, "label": "Windows EXE", "style": 5, "url": "https://example.com/windows-v1.0.0.exe"},
                {"type": 2, "label": "macOS", "style": 5, "url": "https://example.com/macos-v1.0.0.dmg"}
              ]
            }]' \
            '{"content": $content, "components": $components}'
          )
      
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$MESSAGE_JSON" \
               "$DISCORD_WEBHOOK?wait=true&with_components=true"
