name: Test Platform Messaging

on:
  push:
    branches:
      - beta
  workflow_dispatch:

jobs:
  test-platform-messages:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install dependencies
        run: sudo apt-get install -y jq  # Ensures jq is available

      - name: Send Discord Notification with Custom Images
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_ALPHA }}
          ANDROID_ARM64_LINK: https://example.com/android-arm64-v1.0.0.apk
          ANDROID_ARMEABI_LINK: https://example.com/android-armeabi-v7a-v1.0.0.apk
          ANDROID_X86_LINK: https://example.com/android-x86-v1.0.0.apk
          ANDROID_UNIVERSAL_LINK: https://example.com/android-universal-v1.0.0.apk
          IOS_LINK: https://example.com/ios-v1.0.0.ipa
          LINUX_ZIP_LINK: https://example.com/linux-v1.0.0.zip
          LINUX_APPIMAGE_LINK: https://example.com/linux-v1.0.0.AppImage
          LINUX_RPM_LINK: https://example.com/linux-v1.0.0.rpm
          WINDOWS_ZIP_LINK: https://example.com/windows-v1.0.0.zip
          WINDOWS_EXE_LINK: https://example.com/windows-v1.0.0.exe
          MACOS_LINK: https://example.com/macos-v1.0.0.dmg
        run: |
          # Define your custom emoji images
          ANDROID_ICON="https://i.imgur.com/WkN2Wfc.png"
          WINDOWS_ICON="https://i.imgur.com/THq9eXI.png"
          MACOS_ICON="https://i.imgur.com/QRfgvrv.png"
          LINUX_ICON="https://i.imgur.com/aQxJ1FV.png"
          IOS_ICON="https://i.imgur.com/QRfgvrv.png"  # Add iOS icon here
      
          # Construct the message
          MESSAGE_JSON=$(jq -n \
            --arg content "🚀 **New Build Available!** Click a button below to download:\n\n\
            🟢 **Android** ![]($ANDROID_ICON)\n\
            🟢 **Windows** ![]($WINDOWS_ICON)\n\
            🟢 **MacOS** ![]($MACOS_ICON)\n\
            🟢 **Linux** ![]($LINUX_ICON)\n\
            🟢 **iOS** ![]($IOS_ICON)" \
            --argjson components '[
              {"type": 1, "components": [
                {"type": 2, "label": "Android arm64", "style": 5, "url": "'"$ANDROID_ARM64_LINK"'"},
                {"type": 2, "label": "Android armeabi-v7a", "style": 5, "url": "'"$ANDROID_ARMEABI_LINK"'"}
              ]},
              {"type": 1, "components": [
                {"type": 2, "label": "Windows ZIP", "style": 5, "url": "'"$WINDOWS_ZIP_LINK"'"},
                {"type": 2, "label": "Windows EXE", "style": 5, "url": "'"$WINDOWS_EXE_LINK"'"}
              ]},
              {"type": 1, "components": [
                {"type": 2, "label": "macOS", "style": 5, "url": "'"$MACOS_LINK"'"}
              ]},
              {"type": 1, "components": [
                {"type": 2, "label": "Linux ZIP", "style": 5, "url": "'"$LINUX_ZIP_LINK"'"},
                {"type": 2, "label": "Linux AppImage", "style": 5, "url": "'"$LINUX_APPIMAGE_LINK"'"},
                {"type": 2, "label": "Linux RPM", "style": 5, "url": "'"$LINUX_RPM_LINK"'"}
              ]},
              {"type": 1, "components": [
                {"type": 2, "label": "iOS", "style": 5, "url": "'"$IOS_LINK"'"}
              ]}
            ]' \
            '{"content": $content, "components": $components}'
          )
      
          # Send the message to Discord
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$MESSAGE_JSON" \
               "$DISCORD_WEBHOOK?wait=true&with_components=true"
