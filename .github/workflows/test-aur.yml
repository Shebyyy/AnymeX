name: Test AUR Update
on:
  workflow_dispatch:
  push:
    tags:
      - "test-v*"

env:
  FLUTTER_VERSION: "3.32.8"

jobs:
  build-linux-appimage:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      
      - name: Setup Linux
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build cmake clang mpv libgtk-3-dev libblkid-dev liblzma-dev pkg-config libmpv-dev webkit2gtk-4.1 fuse
          wget -qO appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool && sudo mv appimagetool /usr/local/bin/
      
      - name: Setup Environment
        shell: bash
        env:
          AL_CLIENT_ID: ${{ secrets.AL_CLIENT_ID }}
          AL_CLIENT_SECRET: ${{ secrets.AL_CLIENT_SECRET }}
          SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
          SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
          MAL_CLIENT_ID: ${{ secrets.MAL_CLIENT_ID }}
          MAL_CLIENT_SECRET: ${{ secrets.MAL_CLIENT_SECRET }}
          CALLBACK_SCHEME: ${{ secrets.CALLBACK_SCHEME }}
        run: |
          cat > .env << EOF
          AL_CLIENT_ID=$AL_CLIENT_ID
          AL_CLIENT_SECRET=$AL_CLIENT_SECRET
          SIMKL_CLIENT_ID=$SIMKL_CLIENT_ID
          SIMKL_CLIENT_SECRET=$SIMKL_CLIENT_SECRET
          MAL_CLIENT_ID=$MAL_CLIENT_ID
          MAL_CLIENT_SECRET=$MAL_CLIENT_SECRET
          CALLBACK_SCHEME=$CALLBACK_SCHEME
          EOF
      
      - name: Build Linux AppImage
        run: |
          flutter pub get
          flutter build linux --release
          rm -rf AppDir && mkdir -p AppDir/usr/{bin,share/icons/hicolor/256x256/apps}
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          cp assets/images/logo.png AppDir/usr/share/icons/hicolor/256x256/apps/anymex.png
          cp assets/images/logo.png AppDir/anymex.png
          cat > AppDir/anymex.desktop << 'EOF'
          [Desktop Entry]
          Name=AnymeX
          Exec=usr/bin/anymex
          Icon=anymex
          Type=Application
          Categories=Utility;
          EOF
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin/:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib/:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/anymex" "$@"
          EOF
          chmod +x AppDir/AppRun
          /usr/local/bin/appimagetool AppDir
          mkdir -p build/linux/x64/release
          mv AnymeX-x86_64.AppImage build/linux/x64/release/AnymeX-Linux.AppImage
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/linux/x64/release/AnymeX-Linux.AppImage

  create-test-release:
    needs: build-linux-appimage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts
      
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/AnymeX-Linux.AppImage"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          tag: ${{ github.ref_name }}
          prerelease: true
          name: "Test Release ${{ github.ref_name }}"

  update-aur:
    needs: build-linux-appimage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: .
      
      - name: Update AUR
        continue-on-error: true
        env:
          VERSION: ${{ github.ref_name }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          # Wait and retry download with exponential backoff
          MAX_RETRIES=5
          RETRY_COUNT=0
          SLEEP_TIME=10
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES to download AppImage..."
            if wget -q "https://github.com/RyanYuuki/AnymeX/releases/download/${VERSION}/AnymeX-Linux.AppImage"; then
              echo "Download successful!"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Download failed. Waiting ${SLEEP_TIME}s before retry..."
                sleep $SLEEP_TIME
                SLEEP_TIME=$((SLEEP_TIME * 2))
              else
                echo "Failed to download after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done
          
          HASH=$(sha256sum AnymeX-Linux.AppImage | awk '{print $1}')
          PKGVER="${VERSION#v}"
          PKGVER="${PKGVER//-/_}"
          
          echo "Creating PKGBUILD with version: $PKGVER and hash: $HASH"
          
          # Create a temporary directory for the package
          mkdir -p aur-package
          cd aur-package
          
          cat > PKGBUILD << EOF
          # Maintainer: jullanggit <jullanggit@proton.me>
          _pkgname=anymex
          _PkgName=AnymeX
          pkgname=\${_pkgname}-bin
          pkgver=${PKGVER}
          pkgrel=1
          arch=(x86_64)
          pkgdesc='An Open Source app for Tracking Multi Service (AL, MAL, SIMKL)'
          url="https://github.com/RyanYuuki/\${_PkgName}"
          license=(MIT)
          provides=(\${_pkgname}=\${pkgver})
          depends=('libepoxy' 'gdk-pixbuf2' 'pango' 'webkit2gtk-4.1' 'harfbuzz' 'libsoup3' 'glibc' 'fontconfig' 'cairo' 'hicolor-icon-theme' 'glib2' 'gcc-libs' 'mpv' 'zlib-ng-compat' 'gtk3' 'at-spi2-core')
          conflicts=(anymex)
          _appimage="\${_PkgName}-\${pkgver}.AppImage"
          source=("\${_appimage}::\${url}/releases/download/${VERSION}/\${_PkgName}-Linux.AppImage"
                  "LICENSE-\${pkgver}.md::https://raw.githubusercontent.com/RyanYuuki/AnymeX/refs/tags/${VERSION}/LICENSE.md")
          noextract=(\${_appimage})
          sha256sums=('${HASH}' 'SKIP')
          
          prepare() {
              chmod +x "\${_appimage}"
              ./"\${_appimage}" --appimage-extract >/dev/null
          }
          
          build() {
              chmod -R a-x+rX squashfs-root/usr
              chmod +x squashfs-root/usr/bin/anymex
          }
          
          package() {
              install -dm755 "\${pkgdir}/usr/"
              mv "\${srcdir}"/squashfs-root/usr/* "\${pkgdir}/usr/"
              install -Dm644 "\${srcdir}/LICENSE-\${pkgver}.md" "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE.md"
              install -Dm644 /dev/stdin "\${pkgdir}/usr/share/applications/\${_pkgname}.desktop" <<DESKTOP
          [Desktop Entry]
          Version=\${pkgver}
          Type=Application
          Name=\${_PkgName}
          GenericName=\${_PkgName}
          Comment=\${pkgdesc}
          Exec=\${_pkgname}
          Icon=\${_pkgname}
          Terminal=false
          Categories=Utility;Application;
          Keywords=\${_pkgname};anime
          StartupNotify=true
          DESKTOP
          }
          EOF
          
          echo "PKGBUILD created successfully"
          cat PKGBUILD
          
          # Install necessary packages for makepkg
          echo "Installing makepkg dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential fakeroot
          
          # Generate .SRCINFO
          echo "Generating .SRCINFO..."
          makepkg --printsrcinfo > .SRCINFO
          
          echo ".SRCINFO created successfully"
          cat .SRCINFO
          
          # Setup SSH for AUR
          echo "Setting up SSH for AUR..."
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts
          
          cat >> ~/.ssh/config << 'SSHEOF'
          Host aur.archlinux.org
           HostName aur.archlinux.org
           User aur
           IdentityFile ~/.ssh/aur
          SSHEOF
          
          # Clone AUR repository
          echo "Cloning AUR repository..."
          cd ..
          git clone ssh://aur@aur.archlinux.org/anymex-bin.git aur-repo
          cd aur-repo
          
          # Copy new files
          echo "Copying new PKGBUILD and .SRCINFO..."
          cp ../aur-package/PKGBUILD .
          cp ../aur-package/.SRCINFO .
          
          # Show what changed
          echo "Changes to be committed:"
          git diff PKGBUILD || echo "PKGBUILD is new"
          git diff .SRCINFO || echo ".SRCINFO is new"
          
          # Commit and push
          echo "Committing and pushing to AUR..."
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PKGBUILD .SRCINFO
          
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Update to version ${VERSION#v}"
            git push origin master
            echo "Successfully pushed to AUR!"
          fi
