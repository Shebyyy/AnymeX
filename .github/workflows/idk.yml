name: idk Release

on:
  workflow_run:
    workflows:
      - "changelog" # Name of the triggering workflow
    types:
      - completed
  workflow_dispatch: # Allow manual triggering of this workflow
  
jobs:
  notify:
    #if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq
          
      - name: Fetch Repository Tags by Date and Time
        id: fetch_tags
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/tags" -o tags.json
          TAGS=$(jq -r '.[].name' tags.json)

          declare -a TAGS_WITH_DATES=()

          for TAG in $TAGS; do
          TAG_DETAILS=$(curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/git/refs/tags/$TAG")
          OBJECT_URL=$(echo "$TAG_DETAILS" | jq -r '.object.url // empty')

          if [ -n "$OBJECT_URL" ]; then
          OBJECT_DETAILS=$(curl -s "$OBJECT_URL")
          DATE=$(echo "$OBJECT_DETAILS" | jq -r '.tagger.date // .committer.date // empty')

          if [ -n "$DATE" ]; then
          TAGS_WITH_DATES+=("$DATE $TAG")
          else
          echo "No date found for tag $TAG"
          fi
          else
          echo "No object URL found for tag $TAG"
          fi
          done

          echo "Unsorted tags with dates:"
          printf "%s\n" "${TAGS_WITH_DATES[@]}"

          LATEST_TAG=""
          LATEST_DATE=""

          for TAG_DATE in "${TAGS_WITH_DATES[@]}"; do
          TAG_DATE_TIME=$(echo "$TAG_DATE" | awk '{print $1}')
          TAG_NAME=$(echo "$TAG_DATE" | awk '{print $2}')

          if [[ -z "$LATEST_DATE" || "$TAG_DATE_TIME" > "$LATEST_DATE" ]]; then
          LATEST_DATE="$TAG_DATE_TIME"
          LATEST_TAG="$TAG_NAME"
          fi
          done

          echo "The selected latest tag is: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          
      - name: Use the Latest Tag
        run: |
         echo "The latest tag is: ${{ env.LATEST_TAG }}"
         
      - name: Fetch Release Details
        run: |
          curl -s "https://api.github.com/repos/reyyuuki/Azyx/releases/tags/${{ env.LATEST_TAG }}" -o release.json
          RELEASE_NAME=$(jq -r '.name // "No release name"' release.json)
          RELEASE_NOTES=$(jq -r '.body // "No release notes"' release.json)
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
        
           # Write release notes as-is with newlines
            echo -e "RELEASE_NOTES<<EOF\n$RELEASE_NOTES\nEOF" >> $GITHUB_ENV

          # Initialize variables
          formatted_notes=""
          commit_count=0
          current_section=""

          # Read through the release notes
          while IFS= read -r line; do
            if [[ "$line" =~ ^### ]]; then
              # Append "And X more" if section had more than 5 commits
              if [[ "$commit_count" -gt 5 ]]; then
                formatted_notes+="And $((commit_count - 5)) more\n\n"
              fi

              # Start a new section
              formatted_notes+="$line\n"
              current_section="$line"
              commit_count=0
            else
              formatted_notes+="$line\n"
              ((commit_count++))
            fi
          done <<< "$RELEASE_NOTES"

          # If the last section had more than 5 commits
          if [[ "$commit_count" -gt 5 ]]; then
            formatted_notes+="And $((commit_count - 5)) more\n\n"
          fi

          # Append full changelog link
          formatted_notes+="[Full changelog here](https://github.com/RyanYuuki/AnymeX/releases/tag/v2.9.1)"

          # Save formatted notes
          echo -e "RELEASE_NOTES<<EOF\n$formatted_notes\nEOF" >> $GITHUB_ENV

      - name: Display Formatted Release Notes
        run: echo -e "$RELEASE_NOTES"

      - name: Determine Webhook
        id: determine_webhook
        run: |
          if [[ "${RELEASE_NAME}" == *alpha ]]; then
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_ALPHA }}" >> $GITHUB_ENV
          else
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_BETA }}" >> $GITHUB_ENV
          fi


      - name: Send Release Notes to Telegram
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{
              "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "text": "**🚀 New Release: ${RELEASE_NAME}**\n\n$formatted_notes",
              "parse_mode": "Markdown",
              "disable_web_page_preview": true
            }'

      - name: Send Release Notes to Discord
        run: |
          PAYLOAD=$(jq -n \
            --arg content "New Release: $RELEASE_NAME" \
            --arg description "$formatted_notes" \
            --argjson color 5814783 \
            '{ content: $content, embeds: [{ title: "🚀 New Release", description: $description, color: $color }] }')

          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
