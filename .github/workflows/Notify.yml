name: Send Telegram Release Notification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  send_telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract Changelog Entry
        id: changelog
        run: |
          MESSAGE="<b>ЁЯЪА New Release</b>\n\n"
          MESSAGE+="$(awk '/^## /{f=!f} f' CHANGELOG.md | sed -n '2,/^## /{s/^ЁЯФ╣ /ЁЯФЧ /; p}' | sed 's/юАБюАБ[^]]*юАБюАБ(https:\/\/github.com\/RyanYuuki\/AnymeX\/commit\/юАБ[^)]*юАБ)/<a href=\"https:\/\/github.com\/RyanYuuki\/AnymeX\/commit\/\2\">\1<\/a>:/g')"
          echo "MESSAGE=$MESSAGE" >> $GITHUB_ENV

      - name: Send Telegram Message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "text=$MESSAGE" \
            -d "parse_mode=HTML"
