name: Release Notifier for Telegram and Discord

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v2

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      # Step 4: Fetch release information
      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name' release.json)
          RELEASE_NOTES=$(jq -r '.body' release.json)
          ASSET_URLS=$(jq -r '.assets[].browser_download_url' release.json)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "${ASSET_URLS}" > assets.txt

      # Step 5: Send Asset Links to Telegram
      - name: Send Asset Links to Telegram
        run: |

          # Format commit messages for Telegram
          telegram_commit_messages=$(echo "$RELEASE_NAME" | sed 's/%0A/\n/g' | while read -r line; do
          message=$(echo "$line" | sed -E 's/● (.*) ~(.*) \[֍\]\((.*)\)/● \1 ~\2 <a href="\3">֍<\/a>/')
          message=$(echo "$message" | sed -E 's/\[#([0-9]+)\]\((https:\/\/github\.com\/[^)]+)\)/<a href="\2">#\1<\/a>/g')
          echo "$message"
          done)
          telegram_commit_messages="<blockquote>${telegram_commit_messages}</blockquote>"
          
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            # Get the base file name without the extension (e.g., 'file1' instead of 'file1.zip')
            FILE_NAME=$(basename "$ASSET_URL" | cut -d. -f1)
            
            # Append the asset link in the format requested
            ASSET_LINKS="$ASSET_LINKS\nDownload $FILE_NAME: [click here to download]($ASSET_URL)"
          done < assets.txt

          # Send the message to Telegram with the release details and download links for the assets
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"New Release: $telegram_commit_messages\\nRelease Notes: $RELEASE_NOTES\\n$ASSET_LINKS\", \"parse_mode\": \"Markdown\"}"

      # Step 6: Send Asset Links to Discord and Mention User
      - name: Send Asset Links to Discord and Mention User
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            # Get the base file name without the extension (e.g., 'file1' instead of 'file1.zip')
            FILE_NAME=$(basename "$ASSET_URL" | cut -d. -f1)
            
            # Append the asset link in the format requested
            ASSET_LINKS="$ASSET_LINKS\n$FILE_NAME: [click here to download]($ASSET_URL)"
          done < assets.txt

          # Send the message to Discord with the release details and download links for the assets
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
           -H "Content-Type: application/json" \
           -d "{\"content\": \"New Release: $RELEASE_NAME\\nRelease Notes: $RELEASE_NOTES\\n$ASSET_LINKS\"}"
