name: Release Notifier for Telegram and Discord

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name' release.json)
          RELEASE_NOTES=$(jq -r '.body' release.json | sed ':a;N;$!ba;s/\n/\\n/g')
          ASSET_URLS=$(jq -r '.assets[].browser_download_url' release.json)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "${ASSET_URLS}" > assets.txt

      - name: Send Asset Links to Telegram
        run: |
            # Add commit hash as a clickable link to the commit URL
            message=$(echo "$RELEASE_NOTES" | sed -E 's/\[([a-f0-9]{7})\]\((https:\/\/github\.com\/[^)]+)\/commit\/([a-f0-9]{7})\)/<a href="https:\/\/github.com\/\2\/commit\/\3">\1<\/a>/g')
            echo "$message"

            # Format asset links for Telegram with clickable links
            ASSET_LINKS=""
            while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL" | cut -d. -f1)
            ASSET_LINKS="$ASSET_LINKS\nDownload $FILE_NAME: <a href=\"$ASSET_URL\">click here</a>"
            done < assets.txt

            # Send the message to Telegram
            curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"New Release: $RELEASE_NAME
            Release Notes: $message $ASSET_LINKS\", \"parse_mode\": \"HTML\"}"

      - name: Send Asset Links to Discord
        run: |
          # Format commit messages for Discord with clickable commit links
          formatted_commit_messages=$(echo "$RELEASE_NOTES" | sed 's/%0A/\n/g' | while read -r line; do
            # Add commit hash as a clickable link to the commit URL
            line=$(echo "$line" | sed -E 's/\[([a-f0-9]{7})\]\((https:\/\/github\.com\/[^)]+)\/commit\/([a-f0-9]{7})\)/[commit \1](https:\/\/github.com\/\2\/commit\/\3)/g')
            echo "$line"
          done)

          # Format asset links for Discord with markdown
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL" | cut -d. -f1)
            ASSET_LINKS="$ASSET_LINKS\n**$FILE_NAME**: [click here to download]($ASSET_URL)"
          done < assets.txt

          # Send the message to Discord with Markdown formatting
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
           -H "Content-Type: application/json" \
           -d "{\"content\": \"**New Release**: $RELEASE_NAME\n**Release Notes**:\n$formatted_commit_messages\n**Assets**:\n$ASSET_LINKS\"}"
