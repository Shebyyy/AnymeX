name: Release Notifier for Telegram and Discord

on:
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name // "No release name"' release.json)
          RELEASE_NOTES=$(jq -r '.body // "No release notes"' release.json | sed ':a;N;$!ba;s/\n/\\n/g')
          ASSET_URLS=$(jq -r '.assets[]?.browser_download_url // empty' release.json)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "${ASSET_URLS}" > assets.txt

      # Telegram - Send Release Notes
      - name: Send Release Notes to Telegram
        run: |
          MESSAGE="🚀 <b>New Release: ${RELEASE_NAME}</b>\n\n<b>Release Notes:</b>\n${RELEASE_NOTES}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      # Telegram - Send Assets
      - name: Send Assets to Telegram
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            # Ensure URLs are properly encoded for HTML
            ENCODED_URL=$(echo "$ASSET_URL" | jq -sRr @uri)
            ASSET_LINKS="$ASSET_LINKS\nDownload $FILE_NAME: <a href=\"$ENCODED_URL\">click here</a>"
          done < assets.txt
          
          MESSAGE="🚀 <b>Assets for Release: ${RELEASE_NAME}</b>\n\n<b>Assets:</b>${ASSET_LINKS}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      # Discord - Send Release Notes
      - name: Send Release Notes to Discord
        run: |
          HEADER="**🚀 New Release: ${RELEASE_NAME}**\n\n**Release Notes:**\n${RELEASE_NOTES}\n\n"
          PAYLOAD=$(jq -n --arg content "$HEADER" '{ content: $content }')
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # Discord - Send Assets
      - name: Send Assets to Discord
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS\n**[$FILE_NAME]($ASSET_URL)**"
          done < assets.txt
          
          MESSAGE="**Assets for Release: ${RELEASE_NAME}**\n\n**Assets:**${ASSET_LINKS}"
          
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{ content: $content }')
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
