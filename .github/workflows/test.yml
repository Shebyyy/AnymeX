name: Telegram and Discord Release Notifier with Files

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v2

      # Step 2: Set up Python for Telegram and Discord bots
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      # Step 3: Install required dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      # Step 4: Get release details (download URL, assets)
      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name' release.json)
          RELEASE_NOTES=$(jq -r '.body' release.json | sed ':a;N;$!ba;s/\n/\/g')
          ASSET_URLS=$(jq -r '.assets[].browser_download_url' release.json | paste -sd "," -)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "ASSET_URLS=${ASSET_URLS}" >> $GITHUB_ENV

      # Step 5: Download assets
      - name: Download Release Assets
        run: |
          mkdir -p assets
          for ASSET_URL in $(echo "$ASSET_URLS" | tr "," "\n")
          do
            echo "Downloading $ASSET_URL..."
            curl -L -o "assets/$(basename "$ASSET_URL")" "$ASSET_URL" || echo "Failed to download $ASSET_URL"
          done

      # Step 6: Send a message with release notes to Telegram
      - name: Send Message to Telegram
        run: |
          MESSAGE="New Release: $RELEASE_NAME Release Notes: $RELEASE_NOTES"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
               -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
               -d "text=$MESSAGE"

      # Step 7: Send downloaded assets to Telegram
      - name: Send Assets to Telegram
        run: |
          for FILE in assets/*
          do
            echo "Sending $FILE to Telegram..."
            curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
                 -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F "document=@$FILE"
          done

      # Step 8: Send a message with release notes to Discord
      - name: Send Message to Discord
        run: |
          DISCORD_MESSAGE="New Release: **$RELEASE_NAME** Release Notes:$RELEASE_NOTES"
          curl -H "Content-Type: application/json" \
               -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
               -d "{\"content\": \"$DISCORD_MESSAGE\"}"

      # Step 9: Send downloaded assets to Discord
      - name: Send Assets to Discord
        run: |
          for FILE in assets/*
          do
            echo "Sending $FILE to Discord..."
            curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
                 -F "file=@$FILE"
          done
