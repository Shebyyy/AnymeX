name: Release Notifier for Telegram and Discord

on:
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name // "No release name"' release.json)
          RELEASE_NOTES=$(jq -r '.body // "No release notes"' release.json)
          ASSET_URLS=$(jq -r '.assets[]?.browser_download_url // empty' release.json)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "${RELEASE_NOTES}" > notes.txt
          echo "${ASSET_URLS}" > assets.txt

      - name: Send Notification to Telegram
        run: |
          RELEASE_NOTES=$(cat notes.txt | sed ':a;N;$!ba;s/\n/\\n/g')
          RELEASE_NOTES_ESCAPED=$(echo "$RELEASE_NOTES" | sed 's/&/&amp;/g; s/</&lt;/g; s/>/&gt;/g')

          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS\nDownload $FILE_NAME: <a href=\"$ASSET_URL\">click here</a>"
          done < assets.txt

          MESSAGE="🚀 <b>New Release: ${RELEASE_NAME}</b>\n\n<b>Release Notes:</b>\n${RELEASE_NOTES_ESCAPED}\n\n<b>Assets:</b>\n${ASSET_LINKS}"

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      - name: Send Notification to Discord
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS
            **[$FILE_NAME]($ASSET_URL)**"
          done < assets.txt

          # Remove line breaks from release notes
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | tr -d '\n')

          HEADER="**🚀 New Release: ${RELEASE_NAME}**
          **Release Notes:** 
          $RELEASE_NOTES
          **Assets:**"
          MESSAGE="$HEADER
          $ASSET_LINKS"

          if [ ${#MESSAGE} -gt 2000 ]; then
            CHUNKS=$(echo "$MESSAGE" | fold -s -w 2000)
            for CHUNK in $CHUNKS; do
              PAYLOAD=$(jq -n --arg content "$CHUNK" '{ content: $content }')
              curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD"
            done
          else
            PAYLOAD=$(jq -n --arg content "$MESSAGE" '{ content: $content }')
            curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
