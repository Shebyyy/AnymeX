name: Release Notifier for Telegram and Discord

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v2

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      # Step 4: Fetch release information
      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name' release.json)
          RELEASE_NOTES=$(jq -r '.body' release.json | sed ':a;N;$!ba;s/\n/\\n/g')
          ASSET_URLS=$(jq -r '.assets[].browser_download_url' release.json)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "${ASSET_URLS}" > assets.txt

      # Step 5: Send Asset Links to Telegram
      - name: Send Asset Links to Telegram
        run: |
          # Format release notes for Telegram with HTML tags
          telegram_commit_messages=$(echo "$RELEASE_NOTES" | sed 's/%0A/\n/g' | while read -r line; do
            message=$(echo "$line" | sed -E 's/● (.*) ~(.*) \[֍\]\((.*)\)/● \1 ~\2 <a href="\3">֍<\/a>/')
            message=$(echo "$message" | sed -E 's/\[#([0-9]+)\]\((https:\/\/github\.com\/[^)]+)\)/<a href="\2">#\1<\/a>/g')
            echo "$message"
          done)
          telegram_commit_messages="<blockquote>${telegram_commit_messages}</blockquote>"

          # Format asset links for Telegram with clickable links
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL" | cut -d. -f1)
            ASSET_LINKS="$ASSET_LINKS\nDownload $FILE_NAME: <a href=\"$ASSET_URL\">click here</a>"
          done < assets.txt

          # Send the message to Telegram
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"New Release: <b>$RELEASE_NAME</b><br>Release Notes: $telegram_commit_messages<br>$ASSET_LINKS\", \"parse_mode\": \"HTML\"}"

      # Step 6: Send Asset Links to Discord
      - name: Send Asset Links to Discord
        run: |
          # Format asset links for Discord with markdown
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL" | cut -d. -f1)
            ASSET_LINKS="$ASSET_LINKS\n**$FILE_NAME**: [click here to download]($ASSET_URL)"
          done < assets.txt

          # Send the message to Discord with Markdown formatting
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
           -H "Content-Type: application/json" \
           -d "{\"content\": \"**New Release**: $RELEASE_NAME\n**Release Notes**:\n$RELEASE_NOTES\n**Assets**:\n$ASSET_LINKS\"}"
