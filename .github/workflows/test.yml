name: Release Notifier for Telegram and Discord

on:
  release:
    types: [published]
  push:
    branches:
      - main  # or the branch you want to trigger on
  workflow_dispatch:


jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name // "No release name"' release.json)
          RELEASE_NOTES=$(jq -r '.body // "No release notes"' release.json | sed ':a;N;$!ba;s/\n/\\n/g')
          ASSET_URLS=$(jq -r '.assets[]?.browser_download_url // empty' release.json)
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "${ASSET_URLS}" > assets.txt

      - name: Send Notification to Telegram
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS\nDownload $FILE_NAME: <a href=\"$ASSET_URL\">click here</a>"
          done < assets.txt

          # Ensure that newlines are replaced with HTML-safe format for Telegram
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | sed ':a;N;$!ba;s/\n/\\n/g')

          MESSAGE=$(cat <<-EOF
          🚀 <b>New Release: ${RELEASE_NAME}</b>

          <b>Release Notes:</b>
          ${RELEASE_NOTES_ESCAPED}

          <b>Assets:</b>
          ${ASSET_LINKS}
          EOF
          )


          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      - name: Send Notification to Discord
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS
            **[$FILE_NAME]($ASSET_URL)**"
          done < assets.txt

          HEADER="**🚀 New Release: ${RELEASE_NAME}**
          **Release Notes:**
          ${RELEASE_NOTES}
          **Assets:**"
          MESSAGE="$HEADER"

           while IFS= read -r LINE; do
          if [ $((${#MESSAGE} + ${#LINE} + 1)) -gt 2000 ]; then
          MESSAGE=$(echo "$MESSAGE" | sed ':a;N;$!ba;s/\n//g')  # Remove newlines using sed
          LINE=$(echo "$LINE" | sed ':a;N;$!ba;s/\n//g')  # Remove newlines using sed
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{ content: $content }')
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"
          MESSAGE="$LINE"
          else
          MESSAGE="$MESSAGE
          $LINE"
          fi
          done

          done <<< "$ASSET_LINKS"

          if [ -n "$MESSAGE" ]; then
            PAYLOAD=$(jq -n --arg content "$MESSAGE" '{ content: $content }')
            curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
          fi
