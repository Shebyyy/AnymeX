name: Release Notifier for Telegram and Discord

on:
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests jq

      - name: Get Release Info
        id: release_info
        run: |
          curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/releases/latest" -o release.json
          RELEASE_NAME=$(jq -r '.name // "No release name"' release.json)
          RELEASE_NOTES=$(jq -r '.body // "No release notes"' release.json | sed ':a;N;$!ba;s/\n/\\n/g')
          
          # Extract commit IDs from the release notes
          COMMIT_IDS=$(echo "$RELEASE_NOTES" | grep -oE '\b[0-9a-f]{7,40}\b')
          
          COMMIT_LINKS=""
          for COMMIT_ID in $COMMIT_IDS; do
            # Fetch the commit message for each commit ID
            COMMIT_MSG=$(curl -s "https://api.github.com/repos/RyanYuuki/AnymeX/commits/$COMMIT_ID" | jq -r '.commit.message')
            COMMIT_LINK="https://github.com/RyanYuuki/AnymeX/commit/$COMMIT_ID"
            COMMIT_LINKS="$COMMIT_LINKS\n<a href=\"$COMMIT_LINK\">Click here to visit $COMMIT_ID</a>: $COMMIT_MSG"
          done

          ASSET_URLS=$(jq -r '.assets[]?.browser_download_url // empty' release.json)
          
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV
          echo "${ASSET_URLS}" > assets.txt
          echo "COMMIT_LINKS=${COMMIT_LINKS}" >> $GITHUB_ENV

      # Determine webhook based on release name
      - name: Determine Webhook
        id: determine_webhook
        run: |
          if [[ "${RELEASE_NAME}" == *alpha ]]; then
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_ALPHA }}" >> $GITHUB_ENV
            echo "Targeted to Alpha channel"
          elif [[ "${RELEASE_NAME}" == *beta ]]; then
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_BETA }}" >> $GITHUB_ENV
            echo "Targeted to Beta channel"
          else
            echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK }}" >> $GITHUB_ENV
            echo "Targeted to Default channel"
          fi

      # Telegram - Send Release Notes (without commit info)
      - name: Send Release Notes to Telegram
        run: |
          # Remove commit IDs and commit links from the release notes
          CLEANED_RELEASE_NOTES=$(echo "$RELEASE_NOTES" | sed -E 's/\b[0-9a-f]{7,40}\b//g' | sed 's/https:\/\/github.com\/RyanYuuki\/AnymeX\/commit\/[0-9a-f]{7,40}//g')

          # Send the cleaned release notes to Telegram
          ROLE_MENTION="<b>@role</b>"  # Add the actual role username if needed, or leave this empty if no mention
          MESSAGE="🚀 <b>## New Release: ${RELEASE_NAME}</b>\n\n<b>Release Notes:</b>\n${ROLE_MENTION}\n${CLEANED_RELEASE_NOTES}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      # Telegram - Send Commit Info to Telegram
      - name: Send Commit Info to Telegram
        run: |
          MESSAGE="🚀 <b>## New Release: ${RELEASE_NAME}</b>\n\n<b>Commit Information:</b>\n${COMMIT_LINKS}"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": \"$MESSAGE\", \"parse_mode\": \"HTML\"}"

      # Discord - Send Release Notes
      - name: Send Release Notes to Discord
        run: |
          CLEANED_RELEASE_NOTES=$(echo "${RELEASE_NOTES}" | sed 's/\\n//g')
          
          # Mention the role based on environment
          if [[ "${RELEASE_NAME}" == *alpha ]]; then
            ROLE_MENTION="<@&1313089691523878942>"  # Use the actual Role ID for alpha channel
          elif [[ "${RELEASE_NAME}" == *beta ]]; then
            ROLE_MENTION="<@&1313087262539518033>"  # Use the actual Role ID for beta channel
          else
            ROLE_MENTION="<@&1234567>"  # Use the default role ID
          fi

          HEADER="${ROLE_MENTION}
          ## 🚀 New Release: ${RELEASE_NAME}
          
          ${CLEANED_RELEASE_NOTES}"
          PAYLOAD=$(jq -n --arg content "$HEADER" '{ content: $content }')
          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # Discord - Send Commit Info to Discord
      - name: Send Commit Info to Discord
        run: |
          PAYLOAD=$(jq -n --arg content "$COMMIT_LINKS" '{ content: $content }')
          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # Discord - Send Assets
      - name: Send Assets to Discord
        run: |
          ASSET_LINKS=""
          while IFS= read -r ASSET_URL; do
            FILE_NAME=$(basename "$ASSET_URL")
            ASSET_LINKS="$ASSET_LINKS
            **[$FILE_NAME]($ASSET_URL)**"
          done < assets.txt
          
          MESSAGE="## Assets for Release: ${RELEASE_NAME}
          **Assets:**${ASSET_LINKS}"
          
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{ content: $content }')
          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
