name: changelog

on:
  workflow_run:
    workflows:
      - "Build and Release AnymeX"
      - "Build and Release AnymeX Beta"
    types:
      - completed
  workflow_dispatch:
    inputs:
      previous_tag:
        description: "Previous tag to compare against (optional, defaults to second most recent distinct tag)"
        required: false
      current_tag:
        description: "Current tag to generate changelog for (optional, defaults to latest tag)"
        required: false

permissions:
  contents: write

jobs:
  check-tag:
    runs-on: ubuntu-latest
    outputs:
      is_beta: ${{ steps.validate.outputs.is_beta }}
      current_tag: ${{ steps.validate.outputs.current_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and Validate Tag
        id: validate
        run: |
          git fetch --tags

          if [ -n "${{ inputs.current_tag }}" ]; then
            CURRENT_TAG="${{ inputs.current_tag }}"
          else
            CURRENT_TAG=$(git tag --sort=-creatordate | head -n 1)
          fi

          echo "Resolved tag: $CURRENT_TAG"
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT

          if [[ "$CURRENT_TAG" =~ \-beta$ ]]; then
            echo "✅ Tag '$CURRENT_TAG' is a beta tag"
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Tag '$CURRENT_TAG' is a stable tag"
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

  # ─── STABLE ────────────────────────────────────────────────────────────────
  generate-changelog-stable:
    needs: check-tag
    if: ${{ needs.check-tag.outputs.is_beta == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check Job Statuses
        id: check_jobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected, skipping job checks"
            echo "all_jobs_success=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Fetching jobs for workflow run ID: $RUN_ID"

          JOBS_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs")

          echo "Jobs data retrieved"

          REQUIRED_JOBS=("build-all-platforms (android, ubuntu-latest)" "build-all-platforms (linux, ubuntu-latest)" "build-all-platforms (windows, windows-latest)" "build-all-platforms (macos, macos-latest)" "build-all-platforms (ios, macos-latest)")

          ALL_SUCCESS=true

          for REQUIRED_JOB in "${REQUIRED_JOBS[@]}"; do
            JOB_STATUS=$(echo "$JOBS_DATA" | jq -r --arg job "$REQUIRED_JOB" '.jobs[] | select(.name == $job) | .conclusion')

            if [ -z "$JOB_STATUS" ]; then
              echo "⚠️ Job '$REQUIRED_JOB' not found in workflow run"
              ALL_SUCCESS=false
              break
            elif [ "$JOB_STATUS" != "success" ]; then
              echo "❌ Job '$REQUIRED_JOB' failed with status: $JOB_STATUS"
              ALL_SUCCESS=false
              break
            else
              echo "✅ Job '$REQUIRED_JOB' succeeded"
            fi
          done

          if [ "$ALL_SUCCESS" = true ]; then
            echo "✅ All required build jobs succeeded"
          else
            echo "❌ Some required build jobs failed, skipping changelog generation"
          fi

          echo "all_jobs_success=$ALL_SUCCESS" >> $GITHUB_OUTPUT

      - name: Checkout Code
        uses: actions/checkout@v4
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        with:
          fetch-depth: 0

      - name: Clear CHANGELOG.md
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: echo "" > CHANGELOG.md

      - name: Fetch Tags
        id: fetch_tags
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          git fetch --tags
          TAGS=$(git tag --sort=-creatordate | tr '\n' ' ')
          echo "All tags: $TAGS"
          echo "tags=$TAGS" >> $GITHUB_ENV

      - name: Determine Tags for Comparison
        id: determine_tags
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          if [ -n "${{ inputs.current_tag }}" ]; then
            CURRENT_TAG="${{ inputs.current_tag }}"
          else
            CURRENT_TAG=$(git describe --tags --abbrev=0)
          fi
          echo "Current tag: $CURRENT_TAG"
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_ENV

          ALL_TAGS=(${{ env.tags }})
          PREV_TAG=""
          SECOND_PREV_TAG=""

          for TAG in "${ALL_TAGS[@]}"; do
            if [ "$TAG" != "$CURRENT_TAG" ]; then
              if [ -z "$PREV_TAG" ]; then
                PREV_TAG="$TAG"
              elif [ -z "$SECOND_PREV_TAG" ]; then
                SECOND_PREV_TAG="$TAG"
                break
              fi
            fi
          done

          if [ -n "${{ inputs.previous_tag }}" ]; then
            PREV_TAG="${{ inputs.previous_tag }}"
          elif [ "$PREV_TAG" == "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
            PREV_TAG="$SECOND_PREV_TAG"
          fi

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Previous tag: $PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_ENV

      - name: Debug Commit Log
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: git log ${{ env.prev_tag }}..${{ env.current_tag }} --pretty=format:'%h %s'

      - name: Get Commit Messages Between Tags
        id: get_commits
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          git log ${{ env.prev_tag }}..${{ env.current_tag }} --pretty=format:'%h|||%s' > commits.tmp
          echo "commits_file=commits.tmp" >> $GITHUB_OUTPUT

      - name: Categorize Commits
        id: categorize
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Categorizing commits..."
          FEATURES=""; BUG_FIXES=""; REFACTORS=""; STYLE_CHANGES=""; PERFORMANCE=""; CHORES=""
          REPO_URL="https://github.com/${{ github.repository }}"

          get_author_username() {
            local commit_sha="$1"
            local api_url="https://api.github.com/repos/${REPO}/commits/${commit_sha}"
            local response=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "${api_url}")
            echo "$response" | jq -r '.author.login // "ghost"'
          }

          while read -r HASH MESSAGE; do
            [ -z "$HASH" ] && continue

            AUTHOR_USERNAME=$(get_author_username "$HASH")
            echo "Processing commit: $HASH - $MESSAGE by $AUTHOR_USERNAME"

            if [[ "$MESSAGE" =~ ^feat: ]]; then
              DESCR=$(echo "$MESSAGE" | sed 's/^feat: //')
              FEATURES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE" =~ ^(fix|bug|improvement|patch): ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^(fix|bug|improvement|patch): //')
              BUG_FIXES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE" =~ ^refactor: ]]; then
              DESCR=$(echo "$MESSAGE" | sed 's/^refactor: //')
              REFACTORS+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE" =~ ^style: ]]; then
              DESCR=$(echo "$MESSAGE" | sed 's/^style: //')
              STYLE_CHANGES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE" =~ ^perf: ]]; then
              DESCR=$(echo "$MESSAGE" | sed 's/^perf: //')
              PERFORMANCE+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE" =~ ^(chore|docs|build|ci): ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^(chore|docs|build|ci): //')
              CHORES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            fi
          done < <(git log ${{ env.prev_tag }}..${{ env.current_tag }} --pretty=format:'%h %s')

          echo "### 🆕 Changelog" > CHANGELOG.md
          [ -n "$FEATURES" ] && echo -e "### 🌟 Features\n$FEATURES\n" >> CHANGELOG.md
          [ -n "$BUG_FIXES" ] && echo -e "### 🔧 Bug Fixes & Improvements\n$BUG_FIXES\n" >> CHANGELOG.md
          [ -n "$REFACTORS" ] && echo -e "### 🔧 Refactors\n$REFACTORS\n" >> CHANGELOG.md
          [ -n "$STYLE_CHANGES" ] && echo -e "### 🎨 Style Changes\n$STYLE_CHANGES\n" >> CHANGELOG.md
          [ -n "$PERFORMANCE" ] && echo -e "### 🚀 Performance Improvements\n$PERFORMANCE\n" >> CHANGELOG.md
          [ -n "$CHORES" ] && echo -e "### 🧹 Chores & Documentation\n$CHORES\n" >> CHANGELOG.md

          CURRENT_TAG_SAFE=$(echo "${{ env.current_tag }}" | sed 's/[^a-zA-Z0-9.-]//g')
          echo "![Total Downloads](https://img.shields.io/github/downloads/RyanYuuki/AnymeX/total?style=for-the-badge&label=TOTAL%20DOWNLOADS&labelColor=black&color=white) ![Current Release](https://img.shields.io/github/downloads/RyanYuuki/AnymeX/${CURRENT_TAG_SAFE}/total?style=for-the-badge&label=CURRENT%20RELEASE&labelColor=black&color=white)" >> CHANGELOG.md
        shell: /usr/bin/bash -e {0}

      - name: Debug CHANGELOG.md
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: cat CHANGELOG.md

      - name: Commit and Push Changelog
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          git config --global user.name "Git Paneer"
          git config --global user.email "actions@github.com"
          git add CHANGELOG.md
          git commit --allow-empty -m "Update changelog for version ${{ env.current_tag }}"
          git push origin HEAD:main

      - name: Generate Plaintext Changelog for F-Droid/Izzy
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          awk '/^### 🆕 Changelog/{flag=1; next}/^![Tt]otal/{flag=0}flag' CHANGELOG.md \
          | sed -E 's/!\[[^]]*\]\([^)]*\)//g' \
          | sed -E 's/\[[^]]*\]\([^)]*\)//g' \
          | sed 's/^֍[[:space:]]*/- /' \
          | sed '/^$/N;/^\n$/D' \
          > fastlane/metadata/android/en-US/changelogs/default.txt

      - name: Debug default.txt
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: cat fastlane/metadata/android/en-US/changelogs/default.txt

      - name: Commit and Push default.txt
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          git config --global user.name "Git Paneer"
          git config --global user.email "actions@github.com"
          git add fastlane/metadata/android/en-US/changelogs/default.txt
          git commit --allow-empty -m "Update default.txt for version ${{ env.current_tag }}"
          git push origin HEAD:main

      - name: Create or Update Release
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          bodyFile: CHANGELOG.md
          tag: ${{ env.current_tag }}
          allowUpdates: true

  # ─── BETA ──────────────────────────────────────────────────────────────────
  generate-changelog-beta:
    needs: check-tag
    if: ${{ needs.check-tag.outputs.is_beta == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check Job Statuses
        id: check_jobs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected, skipping job checks"
            echo "all_jobs_success=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Fetching jobs for workflow run ID: $RUN_ID"

          JOBS_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs")

          echo "Jobs data retrieved"

          REQUIRED_JOBS=("build-all-platforms (android, ubuntu-latest)" "build-all-platforms (linux, ubuntu-latest)" "build-all-platforms (windows, windows-latest)" "build-all-platforms (macos, macos-latest)" "build-all-platforms (ios, macos-latest)")

          ALL_SUCCESS=true

          for REQUIRED_JOB in "${REQUIRED_JOBS[@]}"; do
            JOB_STATUS=$(echo "$JOBS_DATA" | jq -r --arg job "$REQUIRED_JOB" '.jobs[] | select(.name == $job) | .conclusion')

            if [ -z "$JOB_STATUS" ]; then
              echo "⚠️ Job '$REQUIRED_JOB' not found in workflow run"
              ALL_SUCCESS=false
              break
            elif [ "$JOB_STATUS" != "success" ]; then
              echo "❌ Job '$REQUIRED_JOB' failed with status: $JOB_STATUS"
              ALL_SUCCESS=false
              break
            else
              echo "✅ Job '$REQUIRED_JOB' succeeded"
            fi
          done

          if [ "$ALL_SUCCESS" = true ]; then
            echo "✅ All required build jobs succeeded"
          else
            echo "❌ Some required build jobs failed, skipping changelog generation"
          fi

          echo "all_jobs_success=$ALL_SUCCESS" >> $GITHUB_OUTPUT

      - name: Checkout Beta Repo
        uses: actions/checkout@v4
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        with:
          fetch-depth: 0

      - name: Clone Main Repository
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          echo "════════════════════════════════════════════"
          echo "  Cloning Main Repository for Commits"
          echo "════════════════════════════════════════════"
          git clone https://github.com/RyanYuuki/AnymeX.git main-repo
          echo "✅ Cloned RyanYuuki/AnymeX to main-repo/"

      - name: Read Last Beta Commit
        id: get_last_commit
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          if [ -f ".last-beta-commit" ]; then
            LAST_COMMIT=$(cat .last-beta-commit)
            echo "✅ Found .last-beta-commit: $LAST_COMMIT"
            echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
            echo "is_first_run=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ .last-beta-commit not found, will use last 10 commits"
            echo "last_commit=" >> $GITHUB_OUTPUT
            echo "is_first_run=true" >> $GITHUB_OUTPUT
          fi

      - name: Get Current Latest Commit SHA
        id: get_current_commit
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          cd main-repo
          CURRENT_SHA=$(git rev-parse HEAD)
          echo "Current latest commit: $CURRENT_SHA"
          echo "current_commit=$CURRENT_SHA" >> $GITHUB_OUTPUT

      - name: Get Commits Since Last Build
        id: get_commits
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          cd main-repo
          
          if [ "${{ steps.get_last_commit.outputs.is_first_run }}" = "true" ]; then
            echo "First run - getting last 10 commits"
            git log -10 --pretty=format:'%h|%s' > commits.tmp
          else
            LAST_COMMIT="${{ steps.get_last_commit.outputs.last_commit }}"
            echo "Getting commits after $LAST_COMMIT"
            
            # Check if the commit exists in the repo
            if git cat-file -e "$LAST_COMMIT" 2>/dev/null; then
              git log $LAST_COMMIT..HEAD --pretty=format:'%h|%s' > commits.tmp
            else
              echo "⚠️ Last commit $LAST_COMMIT not found, using last 10 commits"
              git log -10 --pretty=format:'%h|%s' > commits.tmp
            fi
          fi
          
          echo "Commits found:"
          cat commits.tmp
          echo ""

      - name: Categorize Commits
        id: categorize
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Categorizing commits..."
          FEATURES=""; BUG_FIXES=""; REFACTORS=""; STYLE_CHANGES=""; PERFORMANCE=""; CHORES=""
          REPO_URL="https://github.com/RyanYuuki/AnymeX"
          MAIN_REPO="RyanYuuki/AnymeX"

          get_author_username() {
            local commit_sha="$1"
            local api_url="https://api.github.com/repos/${MAIN_REPO}/commits/${commit_sha}"
            local response=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "${api_url}")
            echo "$response" | jq -r '.author.login // "ghost"'
          }

          while IFS='|' read -r HASH MESSAGE; do
            [ -z "$HASH" ] && continue
            # Remove leading/trailing whitespace
            HASH=$(echo "$HASH" | xargs)
            MESSAGE=$(echo "$MESSAGE" | xargs)
            [ -z "$HASH" ] && continue

            AUTHOR_USERNAME=$(get_author_username "$HASH")
            echo "Processing commit: $HASH - $MESSAGE by $AUTHOR_USERNAME"

            # Case-insensitive matching using lowercase
            MESSAGE_LOWER=$(echo "$MESSAGE" | tr '[:upper:]' '[:lower:]')

            # Extract description by removing prefix (case-insensitive)
            if [[ "$MESSAGE_LOWER" =~ ^feat: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Ff]eat:[[:space:]]*//')
              FEATURES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^fix: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Ff]ix:[[:space:]]*//')
              BUG_FIXES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^bug: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Bb]ug:[[:space:]]*//')
              BUG_FIXES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^improvement: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Ii]mprovement:[[:space:]]*//')
              BUG_FIXES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^patch: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Pp]atch:[[:space:]]*//')
              BUG_FIXES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^refactor: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Rr]efactor:[[:space:]]*//')
              REFACTORS+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^style: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Ss]tyle:[[:space:]]*//')
              STYLE_CHANGES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^perf: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Pp]erf:[[:space:]]*//')
              PERFORMANCE+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^chore: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Cc]hore:[[:space:]]*//')
              CHORES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^docs: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Dd]ocs:[[:space:]]*//')
              CHORES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^build: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Bb]uild:[[:space:]]*//')
              CHORES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            elif [[ "$MESSAGE_LOWER" =~ ^ci: ]]; then
              DESCR=$(echo "$MESSAGE" | sed -E 's/^[Cc]i:[[:space:]]*//')
              CHORES+="- [֍]($REPO_URL/commit/$HASH) $DESCR by @${AUTHOR_USERNAME}"$'\n'
            fi
          done < main-repo/commits.tmp

          {
            echo "### 🆕 Beta Changelog"
            echo ""
            echo "> ⚠️ **This is a Beta Release.** Features and fixes in this version are still under testing and may contain bugs or unexpected behavior. Please report any issues you encounter. Do not use in production."
            echo ""
            [ -n "$FEATURES" ] && echo -e "### 🌟 Features\n$FEATURES\n"
            [ -n "$BUG_FIXES" ] && echo -e "### 🔧 Bug Fixes & Improvements\n$BUG_FIXES\n"
            [ -n "$REFACTORS" ] && echo -e "### 🔧 Refactors\n$REFACTORS\n"
            [ -n "$STYLE_CHANGES" ] && echo -e "### 🎨 Style Changes\n$STYLE_CHANGES\n"
            [ -n "$PERFORMANCE" ] && echo -e "### 🚀 Performance Improvements\n$PERFORMANCE\n"
            [ -n "$CHORES" ] && echo -e "### 🧹 Chores & Documentation\n$CHORES\n"
          } > CHANGELOG-BETA.md

          CURRENT_TAG_SAFE=$(echo "${{ needs.check-tag.outputs.current_tag }}" | sed 's/[^a-zA-Z0-9.-]//g')
          echo "![Total Downloads](https://img.shields.io/github/downloads/Shebyyy/AnymeX/total?style=for-the-badge&label=TOTAL%20DOWNLOADS&labelColor=black&color=white) ![Beta Release](https://img.shields.io/github/downloads/Shebyyy/AnymeX/${CURRENT_TAG_SAFE}/total?style=for-the-badge&label=BETA%20RELEASE&labelColor=black&color=white)" >> CHANGELOG-BETA.md
        shell: /usr/bin/bash -e {0}

      - name: Debug CHANGELOG-BETA.md
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: cat CHANGELOG-BETA.md

      - name: Save Commit SHA Files
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          CURRENT_SHA="${{ steps.get_current_commit.outputs.current_commit }}"
          
          # Save current HEAD to .next-beta-commit
          echo "Saving current commit to .next-beta-commit"
          echo "$CURRENT_SHA" > .next-beta-commit
          
          # If .last-beta-commit doesn't exist, create it with current SHA for first run
          if [ ! -f ".last-beta-commit" ]; then
            echo "First run - setting .last-beta-commit to current SHA"
            echo "$CURRENT_SHA" > .last-beta-commit
          fi
          
          echo ""
          echo "Before update:"
          echo "  .next-beta-commit: $(cat .next-beta-commit)"
          echo "  .last-beta-commit: $(cat .last-beta-commit)"

      - name: Commit and Push SHA Files
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        run: |
          CURRENT_SHA="${{ steps.get_current_commit.outputs.current_commit }}"
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Update .last-beta-commit to current HEAD for next run
          echo "$CURRENT_SHA" > .last-beta-commit
          
          git add .next-beta-commit .last-beta-commit
          git commit -m "Update beta commit tracking files for ${{ needs.check-tag.outputs.current_tag }}" || echo "No changes to commit"
          git push origin HEAD:main
          
          echo ""
          echo "After update (for next run):"
          echo "  .last-beta-commit: $(cat .last-beta-commit)"

      - name: Create or Update Beta Release
        if: ${{ steps.check_jobs.outputs.all_jobs_success == 'true' }}
        uses: ncipollo/release-action@v1
        with:
