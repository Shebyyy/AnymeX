name: changelog

on:
  workflow_run:
    workflows:
      - "Build and Release AnymeX" # Name of the triggering workflow
    types:
      - completed
  workflow_dispatch: # Allow manual triggering of this workflow

jobs:
  generate-changelog:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest and previous tags
        id: get_tags
        run: |
          # Fetch all tags
          git fetch --tags
          
          # Get the latest tag
          LATEST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "")
          
          # Get the previous tag
          if [ -n "$LATEST_TAG" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 "$LATEST_TAG"^ 2>/dev/null || echo "")
          else
            PREV_TAG=""
          fi
          
          # If no previous tag, use the initial commit
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          
          echo "Latest tag: $LATEST_TAG"
          echo "Previous tag: $PREV_TAG"
          
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog content
        id: generate_changelog
        run: |
          echo "Generating changelog content..."
          
          PREV_TAG="${{ steps.get_tags.outputs.prev_tag }}"
          LATEST_TAG="${{ steps.get_tags.outputs.latest_tag }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          
          # Initialize categories
          FEATURES=""
          BUG_FIXES=""
          REFACTORS=""
          STYLE_CHANGES=""
          PERFORMANCE=""
          CHORES=""
          OTHER=""
          
          # Get commit messages between tags
          if [ -n "$LATEST_TAG" ]; then
            RANGE="$PREV_TAG..$LATEST_TAG"
          else
            RANGE="$PREV_TAG..HEAD"
          fi
          
          echo "Getting commits in range: $RANGE"
          
          # Process commits
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              HASH=$(echo "$line" | awk '{print $1}')
              MESSAGE=$(echo "$line" | cut -d' ' -f2-)
              LINK="[$HASH]($REPO_URL/commit/$HASH)"
              FORMATTED_COMMIT="- $LINK: $MESSAGE"
              
              # Categorize based on conventional commit format
              case "$MESSAGE" in
                feat:*|feat\(*\):*)
                  FEATURES="$FEATURES$FORMATTED_COMMIT\n"
                  ;;
                fix:*|fix\(*\):*|bug:*|patch:*)
                  BUG_FIXES="$BUG_FIXES$FORMATTED_COMMIT\n"
                  ;;
                refactor:*|refactor\(*\):*)
                  REFACTORS="$REFACTORS$FORMATTED_COMMIT\n"
                  ;;
                style:*|style\(*\):*)
                  STYLE_CHANGES="$STYLE_CHANGES$FORMATTED_COMMIT\n"
                  ;;
                perf:*|perf\(*\):*|performance:*)
                  PERFORMANCE="$PERFORMANCE$FORMATTED_COMMIT\n"
                  ;;
                chore:*|chore\(*\):*|docs:*|build:*|ci:*|test:*)
                  CHORES="$CHORES$FORMATTED_COMMIT\n"
                  ;;
                *)
                  OTHER="$OTHER$FORMATTED_COMMIT\n"
                  ;;
              esac
            fi
          done < <(git log "$RANGE" --pretty=format:'%h %s' --reverse)
          
          # Create changelog content
          CHANGELOG_CONTENT=""
          
          if [ -n "$LATEST_TAG" ]; then
            CHANGELOG_CONTENT="# Changelog for $LATEST_TAG\n\n"
          else
            CHANGELOG_CONTENT="# Changelog\n\n"
          fi
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG_CONTENT="${CHANGELOG_CONTENT}## 🎉 New Features\n${FEATURES}\n"
          fi
          
          if [ -n "$BUG_FIXES" ]; then
            CHANGELOG_CONTENT="${CHANGELOG_CONTENT}## 🛠️ Bug Fixes & Improvements\n${BUG_FIXES}\n"
          fi
          
          if [ -n "$PERFORMANCE" ]; then
            CHANGELOG_CONTENT="${CHANGELOG_CONTENT}## 🚀 Performance Improvements\n${PERFORMANCE}\n"
          fi
          
          if [ -n "$REFACTORS" ]; then
            CHANGELOG_CONTENT="${CHANGELOG_CONTENT}## 🔧 Refactors\n${REFACTORS}\n"
          fi
          
          if [ -n "$STYLE_CHANGES" ]; then
            CHANGELOG_CONTENT="${CHANGELOG_CONTENT}## 🎨 Style Changes\n${STYLE_CHANGES}\n"
          fi
          
          if [ -n "$CHORES" ]; then
            CHANGELOG_CONTENT="${CHANGELOG_CONTENT}## 🧹 Chores & Documentation\n${CHORES}\n"
          fi
          
          # Write to file
          echo -e "$CHANGELOG_CONTENT" > CHANGELOG.md
          
          # Show what was generated
          echo "Generated changelog:"
          cat CHANGELOG.md

      - name: Commit and push changelog
        run: |
          echo "Committing and pushing changelog..."
          
          # Configure git
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet CHANGELOG.md; then
            echo "No changes to changelog, skipping commit"
            exit 0
          fi
          
          # Add and commit
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${{ steps.get_tags.outputs.latest_tag || 'latest changes' }}"
          
          # Push changes
          git push origin HEAD:${{ github.ref_name }}

      - name: Create or Update Release
        if: steps.get_tags.outputs.latest_tag != ''
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.get_tags.outputs.latest_tag }}
          name: "Release ${{ steps.get_tags.outputs.latest_tag }}"
          bodyFile: CHANGELOG.md
          allowUpdates: true
